name: Playwright Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      LOGIN_USERNAME: ${{ secrets.LOGIN_USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Verify required env vars
        run: |
          if [ -z "$BASE_URL" ]; then echo "BASE_URL missing"; exit 1; fi
          if [ -z "$LOGIN_USERNAME" ]; then echo "LOGIN_USERNAME missing"; exit 1; fi
          if [ -z "$PASSWORD" ]; then echo "PASSWORD missing"; exit 1; fi
          echo "Required env vars are present"

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/